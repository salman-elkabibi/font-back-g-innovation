name: Vue CI/CD with Vercel

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run test --if-present

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      # 🐳 Build Docker
      - name: Build Docker image
        run: docker build -t vue-app .

      # 📦 Upload dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      # 🔐 Login to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🏷️ Tag and push Docker image
      - name: Tag and push Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/vue-app:${{ github.sha }}
          docker tag vue-app $IMAGE_NAME
          docker push $IMAGE_NAME

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # 🔧 Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      # 🔐 Configure Kubernetes
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # 🚀 Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/vue-app:${{ github.sha }}
          sed -i "s|ghcr.io/yourusername/vue-app:latest|$IMAGE_NAME|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml -f k8s/service.yaml